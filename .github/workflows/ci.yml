name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint .
      - name: Test
        run: npx vitest run
      - name: Verify committed bundles are up to date
        run: git diff --exit-code -- dist pages/app.js
      - name: actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  e2e:
    name: Run on demo project
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize Pages publishes so concurrent branch builds do not race on the
    # gh-pages branch.
    concurrency:
      group: librepcb-ci-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Debug workspace mount
        run: |
          img=librepcb/librepcb-cli:2.1.1
          docker pull -q "$img"
          echo "=== T1: uid1001 sh can stat demo? ==="
          docker run --rm --user 1001:1001 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/sh "$img" -c 'id; stat /work/demo >/dev/null 2>&1 && echo CAN_STAT || echo CANNOT_STAT' || true
          echo "=== T2: uid1001 default entrypoint (repro) ==="
          docker run --rm --user 1001:1001 -v "$GITHUB_WORKSPACE:/work" -w /work "$img" open-project --erc demo 2>&1 | tail -4 || true
          echo "=== T3: uid1001 + HOME=/tmp ==="
          docker run --rm --user 1001:1001 -e HOME=/tmp -v "$GITHUB_WORKSPACE:/work" -w /work "$img" open-project --erc demo 2>&1 | tail -4 || true
          echo "=== T4: root default entrypoint ==="
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work "$img" open-project --erc demo 2>&1 | tail -4 || true
      - name: Run librepcb-ci on the demo project
        id: librepcb
        uses: ./
        with:
          projects: demo
          librepcb-version: "2.1.1"
          run-checks: true
          # The demo is a third-party test project; do not fail the demo build on
          # its ERC/DRC messages.
          checks-fatal: false
          # Publish only on push (pull requests, including forks, lack a write token).
          pages: ${{ github.event_name == 'push' }}
      - name: Assert outputs were produced
        run: |
          set -euo pipefail
          dir="${{ steps.librepcb.outputs.output-dir }}"
          test -f "$dir/demo/manifest.json"
          test -f "$dir/demo/demo.zip"
          test -f "$dir/projects.json"
          echo "Outputs present in $dir:"
          find "$dir" -type f | sort | head -80
