name: Release

# Keep the moving major tag (e.g. v1) pointing at the latest release in that
# major series, so consumers can pin `uses: Tubbles/librepcb-ci@v1`.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  move-major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move major version tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          case "$TAG" in
            v*) ;;
            *) echo "Release tag '$TAG' is not a vMAJOR.MINOR.PATCH tag; skipping."; exit 0 ;;
          esac
          major="${TAG%%.*}"   # v1.2.3 -> v1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$TAG"
          # Move the remote major tag without a force-push: delete then recreate.
          git push origin ":refs/tags/$major" || true
          git push origin "refs/tags/$major"
          echo "Moved $major -> $TAG"
